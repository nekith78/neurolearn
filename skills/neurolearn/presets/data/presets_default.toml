# Built-in 4-tier presets. User overrides go to ~/.neurolearn/config.toml.

default_preset = "smart"

# === ECO ===
[presets.eco]
transcribe_backend = "subtitles"
fallback_backend = "whisper-local"
vision_backend = "off"
detect_method = "keywords_only"
quality_check = false
max_windows_per_video = 0

# === SMART (default) ===
# v0.10.6: vision is OFF by default in smart preset. The previous
# behavior (vision_backend = "gemini") silently triggered ~1+N Gemini
# calls per video on every `transcribe` invocation that didn't pass an
# explicit `--preset`, exhausting Gemini free-tier daily quota (20 calls/day)
# on the very first 8+ min video. Vision is now opt-in via either
# `--with-visuals` (a CLI override that sets vision_backend=gemini) or
# an explicit `--preset standard / premium / tutorial`, all of which
# keep vision enabled by design.
[presets.smart]
transcribe_backend = "subtitles"
fallback_backend = "whisper-local"
quality_check = true
subtitle_quality_threshold = 0.6
vision_backend = "off"
detect_method = "hybrid"
frames_per_window = 3
max_windows_per_video = 0

# === STANDARD ===
[presets.standard]
transcribe_backend = "whisper-local"
vision_backend = "on"
detect_method = "hybrid"
frames_per_window = 3
max_windows_per_video = 30

# === PREMIUM ===
[presets.premium]
transcribe_backend = "whisper-local"
vision_backend = "on"
detect_method = "hybrid"
frames_per_window = 5
max_windows_per_video = 50
quality_check = true
quality_perplexity = true

# === TUTORIAL ===
# Optimized for UI / software tutorials with explicit action speech
# ("click here", "press save", "нажимаем", "выбираем"). Speech-anchored
# asymmetric frame offsets capture before-state, the click moment, and
# the UI-settled-after state. Claude fallback re-checks low-confidence
# segments (small text, similar-looking elements).
# Auto-applied by the smart preset when the transcript contains a high
# density of action triggers; set --preset tutorial to force.
[presets.tutorial]
transcribe_backend = "smart"
vision_backend = "on"
detect_method = "keywords_only"
frames_per_window = 3
max_windows_per_video = 30
asymmetric_frames = true
# v0.12.0: claude_fallback removed (was no-op anyway after Anthropic
# API removal). Users wanting Claude refinement should run via
# Claude Code plugin — see SKILL.md.
