FIELDS:
- description: ≤30 words. Name the file, then what the code at the focus does.
- key_objects: function names, class names, file paths, error types (max 8)
- importance: "high" when new code is written/explained; "medium" navigation; "low" talking head
- confidence: 1.0 only if file path and identifiers are clearly readable
- needs_refinement: true if font is too small or panes overlap

Audio context: {transcript_snippet}
Time: {start_sec:.1f}s - {end_sec:.1f}s.

If only the speaker is on camera with no code visible, output one short
sentence noting that, key_objects=[], importance="low".
"""

