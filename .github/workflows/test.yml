name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: unit (py${{ matrix.python }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
        python: ["3.11", "3.12", "3.13"]
        # macos-14 is arm64 (Apple Silicon) on GitHub-hosted runners — exercises the mlx-whisper marker path
        # 3.10 dropped: onnxruntime 1.24+ requires cp311+ (transitive via faster-whisper)
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }} && uv python pin ${{ matrix.python }}

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run unit tests (e2e smoke skipped without RUN_E2E_SMOKE)
        env:
          # macOS-14 runners are M-series with limited GPU memory.
          # sentence-transformers loads the multilingual MiniLM model on MPS
          # by default; on a constrained runner that can OOM. Disable the
          # upper-limit watermark and allow CPU fallback for unsupported ops.
          PYTORCH_MPS_HIGH_WATERMARK_RATIO: "0.0"
          PYTORCH_ENABLE_MPS_FALLBACK: "1"
          # Avoid tokenizers fork warnings on parallel runs.
          TOKENIZERS_PARALLELISM: "false"
        run: uv run pytest -q --tb=short

      # E2E smoke is intentionally NOT run in CI by default — it hits real YouTube
      # and pulls 600MB models on the mlx path. Trigger manually via workflow_dispatch
      # or a separate scheduled job once we have a stable test fixture.
